name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Typecheck & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test:unit

  rls:
    name: RLS isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      # The supabase CLI ships as a pinned devDependency (node_modules/.bin/supabase);
      # `db:test:up` boots a slim local stack (db + auth) and applies supabase/migrations.
      - name: Start Supabase
        run: bun run db:test:up
      - name: Run RLS isolation matrix
        run: bun run test:rls
      - name: Stop Supabase
        if: always()
        run: bun run db:test:down
